    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #050805;
            background: radial-gradient(circle at 50% 50%, #0a0f0a, #030503);
            font-family: 'Space Mono', 'Courier New', monospace;
            color: #b3ffcf;
            position: relative;
        }

        /* neon grid overlay - low opacity to save GPU */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        .glow-text {
            text-shadow: 0 0 5px #00ff41;
        }

        .cyber-card {
            background: rgba(10, 15, 10, 0.98); /* Solid background to avoid blur crash */
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 24px;
            transition: transform 0.2s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        /* simple fade-in to prevent layout shift */
        .product-card {
            opacity: 1;
            transform: translateY(0);
        }

        /* Mobile specific active state instead of hover */
        .cyber-card:active {
            border-color: #00ff41;
            transform: scale(0.98);
        }

        .img-container {
            position: relative;
            width: 100%;
            height: 12rem;
            background: #0a120a;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 65, 0.1);
        }

        .img-container.skeleton {
            background: linear-gradient(90deg, #0d1a0d, #1a2a1a, #0d1a0d);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* touch-friendly buttons */
        .btn-buy, .toggle-details, button {
            min-height: 48px;
            touch-action: manipulation;
        }

        .btn-buy {
            background: #00cc33;
            color: black;

            border: none;
            border-radius: 50px;
            padding: 0 20px;
            display: flex;

        }

        input, textarea {
            background: #0a0f0a !important;
            border: 1.5px solid #2a4a2a !important;
            color: #d0ffd0 !important;
            border-radius: 12px;
            padding: 12px;
        }

        input:focus {
            border-color: #00ff41 !important;
            outline: none;
        }

        .modal-bg {
            background: rgba(0, 0, 0, 0.96); /* No blur for stability */
        }

        function renderProducts(filter = "") {
            const grid = document.getElementById('productGrid');
            const items = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            
            grid.innerHTML = items.map((p, i) => `
                <div class="cyber-card p-5 product-card">
                    <div class="img-container skeleton">
                        <img src="${p.image}" alt="${p.name}" loading="lazy" onload="this.parentElement.classList.remove('skeleton')">
                    </div>
                    <div class="mt-4">
                        <h3 class="text-lg font-bold text-white leading-tight">${p.name}</h3>
                        <p class="text-[11px] text-green-300/70 mt-1">${p.shortDesc}</p>
                        <div class="mt-3 flex flex-wrap gap-1">
                            ${p.features.slice(0, 3).map(f => `<span class="bg-green-950 text-green-400 text-[9px] px-2 py-0.5 rounded border border-green-800/40">${f}</span>`).join('')}
                        </div>
                        <div class="flex justify-between items-center mt-5">
                            <span class="text-green-400 font-bold font-mono">৳ ${p.price}</span>
                            <button type="button" onclick="showOrderForm('${p.name}', '${p.price}')" class="btn-buy text-xs">অর্ডার করুন</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showOrderForm(name, price) {
            selectedProduct = { name, price };
            document.getElementById('orderModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Stop background scroll
        }

        function hideOrderForm() {
            document.getElementById('orderModal').classList.add('hidden');
            document.body.style.overflow = ''; // Restore scroll
        }

        async function submitToTelegram() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const addr = document.getElementById('custAddr').value.trim();
            const btn = document.getElementById('submitBtn');

            if (!name || !phone || !addr) {
                Swal.fire({ icon: 'warning', title: 'তথ্য দিন', background: '#0a0f0a', color: '#ff4141' });
                return;
            }

            btn.disabled = true;
            btn.innerText = "পাঠানো হচ্ছে...";

            const text = `🛒 *নতুন অর্ডার*\n\n📦 *পণ্য:* ${selectedProduct.name}\n💰 *দাম:* ${selectedProduct.price} ৳\n👤 *নাম:* ${name}\n📞 *ফোন:* ${phone}\n🏠 *ঠিকানা:* ${addr}`;

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'Markdown' })
                });
                Swal.fire({ icon: 'success', title: 'অর্ডার সফল!', background: '#0a0f0a', color: '#00ff41' });
                hideOrderForm();
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'ভুল হয়েছে', background: '#0a0f0a' });
            } finally {
                btn.disabled = false;
                btn.innerText = "অর্ডার কনফার্ম";
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderProducts(e.target.value));

        renderProducts();
